name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t test-image:latest .
          docker build -t ghcr.io/luoda2023/LUODA-token:latest .
          docker build -t ghcr.io/luoda2023/LUODA-token:v1.0.0 .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          echo "=== Pushing image now ==="
          docker push ghcr.io/luoda2023/LUODA-token:latest
          docker push ghcr.io/luoda2023/LUODA-token:v1.0.0
          echo "=== Push complete ==="
          
      - name: Verify package exists
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/luoda2023/packages?package_type=container" | \
            jq '.[] | select(.name | test("LUODA-token"))'